<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .og-card {
    display: flex;
    flex-direction: row;
    width: 1200px;
    height: 630px;
  }
  .left-column {
    width: 660px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px 60px 72px;
  }
  .right-column {
    width: 540px;
    position: relative;
    overflow: hidden;
  }
  .right-column img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }
  .accent-line {
    width: 36px;
    height: 2px;
    background: #D8A0C4;
    border-radius: 1px;
    margin-bottom: 24px;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 56px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .subhead {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: #6A6B6C;
    letter-spacing: 0.01em;
    line-height: 1.4;
    margin-top: 18px;
    max-width: 560px;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="left-column">
    <div class="accent-line"></div>
    <div class="headline">How much does a doula cost?</div>
    <div class="subhead">Real numbers, no surprises</div>
  </div>
  <div class="right-column">
    <img src="file:///Users/socializerender/.openclaw/workspace/Kit/life/brands/TrueJoyBirthing/web-strategy/truejoybirthing-website/public/images/shelbi-hero-portrait.webp" alt="Shelbi Kohler — certified birth doula">
  </div>
</div>
</body>
</html>
