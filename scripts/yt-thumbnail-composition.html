<!DOCTYPE html>
<!--
  YouTube thumbnail composition template v2.
  Usage: rendered by render-yt-thumbnail.cjs with embedded data URIs
  Output: 1280x720 PNG → WebP
  Design: full-bleed hero bg, left-side lavender gradient overlay,
  dark blur box headline + subtitle, brand logo, play indicator.
-->
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #2A2A2A;
  }

  /* Full-bleed hero background */
  .hero-bg {
    position: absolute;
    top: 0; left: 0;
    width: 1280px; height: 720px;
    object-fit: cover;
  }

  /* Lavender gradient overlay — strong left, fades to right */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 1280px; height: 720px;
    background: linear-gradient(
      to right,
      rgba(110, 108, 153, 0.70) 0%,
      rgba(110, 108, 153, 0.35) 35%,
      rgba(110, 108, 153, 0.05) 55%,
      transparent 100%
    );
  }

  /* Bottom gradient for brand/play legibility */
  .bottom-gradient {
    position: absolute;
    bottom: 0; left: 0;
    width: 1280px; height: 160px;
    background: linear-gradient(to top, rgba(42,42,42,0.35) 0%, transparent 100%);
  }

  /* Rose accent bar across top */
  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 1280px; height: 5px;
    background: #D8A0C4;
  }

  /* City badge — top-left pill */
  .city-badge {
    position: absolute;
    top: 30px; left: 40px;
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: #FFFFFF;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    background: rgba(42,42,42,0.55);
    padding: 7px 16px;
    border-radius: 6px;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }

  /* Headline container — dark translucent box, guaranteed readability */
  .headline-wrapper {
    position: absolute;
    top: 80px;
    left: 40px;
    background: rgba(42,42,42,0.60);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 14px;
    padding: 24px 32px 22px 32px;
    max-width: 660px;
  }

  .headline {
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: 62px;
    color: #FFFFFF;
    line-height: 1.08;
    letter-spacing: -0.01em;
  }

  /* Subtitle — smaller, inside the same box */
  .subtitle {
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    font-size: 24px;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
    margin-top: 10px;
    letter-spacing: 0.02em;
  }

  /* Brand — bottom-left */
  .brand {
    position: absolute;
    bottom: 30px;
    left: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-logo {
    width: 36px;
    height: 36px;
  }
  .brand-text {
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.03em;
  }

  /* Play indicator — bottom-right */
  .watch-indicator {
    position: absolute;
    bottom: 32px;
    right: 44px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .play-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.20);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-triangle {
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #FFFFFF;
    margin-left: 3px;
  }
  .watch-label {
    font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: rgba(255,255,255,0.80);
    letter-spacing: 0.04em;
  }

  /* Brand logo SVG inline container */
  .brand svg {
    width: 36px;
    height: 36px;
  }

  /* Color fill override for the SVG logo to make it white-on-dark */
  .brand svg *[fill], .brand-logo-fill {
    fill: #FFFFFF !important;
  }
</style>
</head>
<body>
  <img class="hero-bg" src="" id="heroImage" alt="">
  <div class="overlay"></div>
  <div class="bottom-gradient"></div>
  <div class="accent-bar"></div>

  <!-- City badge -->
  <div class="city-badge" id="cityBadge">DENVER, CO</div>

  <!-- Headline box with title + subtitle -->
  <div class="headline-wrapper">
    <div class="headline" id="headline">Your Complete<br>Denver Birth Guide</div>
    <div class="subtitle" id="subtitle">Doulas · Hospitals · Costs · Medicaid</div>
  </div>

  <!-- Brand + logo -->
  <div class="brand">
    <span id="brandLogoContainer"></span>
    <span class="brand-text">True Joy Birthing</span>
  </div>

  <!-- Play indicator -->
  <div class="watch-indicator">
    <div class="play-circle">
      <div class="play-triangle"></div>
    </div>
    <span class="watch-label">Watch</span>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const city = params.get('city') || 'Denver';
    const state = params.get('state') || 'CO';
    const h = params.get('headline') || 'Your Complete<br>Denver Birth Guide';
    const sub = params.get('subtitle') || 'Doulas · Hospitals · Costs · Medicaid';
    const logoSvg = params.get('logo') || '';

    document.getElementById('cityBadge').textContent = city.toUpperCase() + ', ' + state.toUpperCase();
    document.getElementById('headline').innerHTML = h;
    document.getElementById('subtitle').innerHTML = sub;

    // Inject inline SVG logo
    if (logoSvg) {
      const container = document.getElementById('brandLogoContainer');
      container.innerHTML = decodeURIComponent(logoSvg);
      // Force all SVG fills to white
      const svgEl = container.querySelector('svg');
      if (svgEl) {
        svgEl.style.width = '36px';
        svgEl.style.height = '36px';
        svgEl.querySelectorAll('*').forEach(el => {
          if (el.tagName !== 'style' && el.tagName !== 'STYLE') {
            el.setAttribute('fill', '#FFFFFF');
          }
        });
      }
    }
  </script>
</body>
</html>
