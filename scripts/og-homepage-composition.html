<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .og-card {
    display: flex;
    flex-direction: row;
    width: 1200px;
    height: 630px;
  }
  .left-column {
    width: 660px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px 60px 72px;
  }
  .right-column {
    width: 540px;
    position: relative;
    overflow: hidden;
  }
  .right-column img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
  }
  .icon-mark {
    margin-bottom: 20px;
  }
  .accent-line {
    width: 36px;
    height: 2px;
    background: #D8A0C4;
    border-radius: 1px;
    margin-bottom: 24px;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 56px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .subhead {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: #6A6B6C;
    letter-spacing: 0.01em;
    line-height: 1.4;
    margin-top: 18px;
    max-width: 560px;
  }
  .wordmark {
    position: absolute;
    bottom: 40px;
    left: 72px;
    line-height: 1.0;
  }
  .wordmark-truejoy {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 20px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
  }
  .wordmark-birthing {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: #8E8CB5;
    letter-spacing: 0.02em;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="left-column">
    <div class="icon-mark">
      <!-- Cradle v2 icon mark — no background circle for OG. Strokes: lavender-500, seed: rose-400 -->
      <svg width="48" height="48" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M38 82 C30 72 26 58 30 44 C32 36 38 30 46 28" stroke="#8E8CB5" stroke-width="5.5" stroke-linecap="round" fill="none"/>
        <path d="M90 82 C98 72 102 58 98 44 C96 36 90 30 82 28" stroke="#8E8CB5" stroke-width="5.5" stroke-linecap="round" fill="none"/>
        <ellipse cx="64" cy="58" rx="14" ry="18" fill="#D8A0C4"/>
        <path d="M64 76 C61 73 56 70 56 67 C56 64 59 62 62 64 L64 66 L66 64 C69 62 72 64 72 67 C72 70 67 73 64 76Z" fill="#8E8CB5" opacity="0.6"/>
      </svg>
    </div>
    <div class="accent-line"></div>
    <div class="headline">Free Birth Plan</div>
    <div class="subhead">Designed to be read by a nurse in two minutes</div>
    <div class="wordmark">
      <div class="wordmark-truejoy">True&nbsp;Joy</div>
      <div class="wordmark-birthing">Birthing</div>
    </div>
  </div>
  <div class="right-column">
    <img src="file:///Users/socializerender/.openclaw/workspace/Kit/life/brands/TrueJoyBirthing/web-strategy/truejoybirthing-website/public/images/shelbi-hero-portrait.webp" alt="Shelbi Kohler — certified birth doula">
  </div>
</div>
</body>
</html>
