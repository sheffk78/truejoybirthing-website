<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; background: #2D2B55; }

.og-card {
  width: 1200px;
  height: 630px;
  display: flex;
  flex-direction: row;
  position: relative;
  overflow: hidden;
}

/* LEFT HALF — text content on brand cream */
.text-half {
  width: 50%;
  height: 630px;
  background: linear-gradient(180deg, #FAF8F5 0%, #E8E6F0 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 50px 60px 50px;
  position: relative;
  overflow: hidden;
}

/* Accent bars */
.text-half::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
  z-index: 10;
}
.text-half::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
  z-index: 10;
}

/* Rose accent line */
.rose-line {
  width: 40px;
  height: 3px;
  background: #D8A0C4;
  margin-bottom: 18px;
  position: relative;
  z-index: 5;
}

.label {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #6E6C99;
  text-transform: uppercase;
  letter-spacing: 5px;
  margin-bottom: 10px;
  position: relative;
  z-index: 5;
}

.headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 48px;
  font-weight: 700;
  color: #2D2B55;
  line-height: 1.1;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 5;
  margin-bottom: 12px;
  max-width: 460px;
}

.subtext {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: #6E6C99;
  letter-spacing: 0.3px;
  position: relative;
  z-index: 5;
  margin-bottom: 20px;
  max-width: 420px;
  line-height: 1.4;
}

.cta {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #C17BAF;
  letter-spacing: 0.5px;
  z-index: 5;
  position: relative;
}

/* RIGHT HALF — Real PDF mockup photo on lavender gradient */
.image-half {
  width: 50%;
  height: 630px;
  background: linear-gradient(135deg, #E8E6F0 0%, #D8D6E8 50%, #C5C3D9 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Real 3D booklet mockup — stacked pages with curl and shadow, fills the right half */
.pdf-mockup {
  width: 380px;
  height: auto;
}

/* Logo bottom-right */
.logo-wrap {
  position: absolute;
  bottom: 24px;
  right: 40px;
  z-index: 10;
}
.logo-wrap img {
  height: 40px;
  width: auto;
}
</style>
</head>
<body>
<div class="og-card">
  <!-- LEFT: Brand text content -->
  <div class="text-half">
    <div class="rose-line"></div>
    <div class="label">Free Doula-Crafted Birth Plan</div>
    <div class="headline">Your birth plan gives you the words when your doctor recommends something you didn't expect</div>
    <div class="subtext">Free fillable PDF template · Guided app walkthrough · Nurse-readable design</div>
    <div class="cta">truejoybirthing.com →</div>
  </div>

  <!-- RIGHT: Real PDF mockup photo -->
  <div class="image-half">
    <img class="pdf-mockup" src="https://truejoybirthing.com/images/birth-plan-booklet-2.webp" alt="Joyful Birth Plan booklet — real printed mockup showing the complete birth plan document" />
    <div class="logo-wrap">
      <img src="https://truejoybirthing.com/images/logo-mono.svg" alt="True Joy Birthing">
    </div>
  </div>
</div>
</body>
</html>
