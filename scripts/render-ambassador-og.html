<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Source Sans 3', sans-serif; }

.og-card {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #FAF8F5 0%, #EDE5F5 100%);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Rose accent bars */
.accent-top {
  position: absolute; top: 0; left: 0; right: 0;
  height: 6px; background: #D8A0C4;
}
.accent-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 6px; background: #D8A0C4;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 80px 80px;
  text-align: center;
}

.eyebrow {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #B87AA0;
  margin-bottom: 16px;
}

.accent-line {
  width: 40px; height: 3px;
  background: #D8A0C4;
  margin: 0 auto 20px;
}

.headline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 56px;
  line-height: 1.1;
  color: #2A2A2A;
  max-width: 800px;
  margin-bottom: 16px;
}

.tagline {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 400;
  font-size: 20px;
  line-height: 1.4;
  color: #555555;
  max-width: 650px;
  margin-bottom: 24px;
}

.bullets {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 15px;
  color: #6A6B6C;
}

.bullets span {
  color: #D8A0C4;
  margin: 0 8px;
}

.logo {
  position: absolute;
  bottom: 24px;
  left: 40px;
  height: 56px;
}
.logo img { height: 56px; }
</style>
</head>
<body>
<div class="og-card">
  <div class="accent-top"></div>
  <div class="content">
    <div class="eyebrow">For Doulas & Midwives</div>
    <div class="accent-line"></div>
    <div class="headline">Free Pro Mode.<br>No Quotas. No Contracts.</div>
    <div class="tagline">Join the True Joy Birthing ambassador program. Featured city listings, cross-promotion, and a community that amplifies your work.</div>
    <div class="bullets">Free Pro Mode <span>·</span> Featured City Page <span>·</span> Partner Badge <span>·</span> Early Access</div>
  </div>
  <div class="accent-bottom"></div>
  <div class="logo">
    <img src="https://truejoybirthing.com/images/logo-mono.svg" alt="True Joy Birthing">
  </div>
</div>
</body>
</html>
