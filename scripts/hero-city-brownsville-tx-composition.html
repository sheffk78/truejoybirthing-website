<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 800px; overflow: hidden; font-family: 'Source Sans 3', sans-serif; }
.container { width: 100%; height: 100%; position: relative; background: linear-gradient(135deg, #2A2A2A 0%, #1A1A2E 50%, #2A2A2A 100%); }
.overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%); }
.content { position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 2; }
.eyebrow { font-family: 'Source Sans 3', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; color: #D8A0C4; margin-bottom: 12px; }
.headline { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 64px; line-height: 1.1; color: #FFFFFF; max-width: 700px; margin-bottom: 16px; }
.subhead { font-family: 'Source Sans 3', sans-serif; font-weight: 400; font-size: 20px; line-height: 1.4; color: #CCCCCC; max-width: 600px; margin-bottom: 24px; }
.stats { display: flex; gap: 32px; }
.stat { font-family: 'Source Sans 3', sans-serif; }
.stat-num { font-weight: 600; font-size: 28px; color: #D8A0C4; }
.stat-label { font-weight: 400; font-size: 14px; color: #999999; letter-spacing: 0.05em; }
.silhouette { position: absolute; right: 40px; bottom: 0; height: 90%; opacity: 0.15; }
.silhouette svg { height: 100%; }
.accent-line { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #D8A0C4, #B87AA0, #D8A0C4); }
</style>
</head>
<body>
<div class="container">
  <div class="accent-line"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="eyebrow">Texas Birth Guide</div>
    <div class="headline">Find Your Doula in Brownsville, TX</div>
    <div class="subhead">Connect with 0 trusted birth professionals serving Brownsville County County and the Brownsville area.</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">0</div>
        <div class="stat-label">Doulas &amp; Midwives</div>
      </div>
      <div class="stat">
        <div class="stat-num">2</div>
        <div class="stat-label">Hospitals &amp; Birth Centers</div>
      </div>
    </div>
  </div>
  <div class="silhouette">
    <svg viewBox="0 0 200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 50 C130 50 150 80 150 120 C150 160 130 190 100 190 C70 190 50 160 50 120 C50 80 70 50 100 50Z" fill="#D8A0C4" opacity="0.6"/>
      <path d="M60 200 C60 200 40 350 30 450 C20 550 20 600 20 650 L180 650 C180 600 180 550 170 450 C160 350 140 200 140 200" fill="#D8A0C4" opacity="0.4"/>
      <circle cx="100" cy="100" r="30" fill="#D8A0C4" opacity="0.3"/>
    </svg>
  </div>
</div>
</body>
</html>
