<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 800px;
    overflow: hidden;
  }
  .hero-card {
    width: 1200px;
    height: 800px;
    background: linear-gradient(135deg, #FAF8F5 0%, #E6BBD8 30%, #8E8CB5 60%, #A8B5A0 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .city-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 96px;
    color: #2A2A2A;
    letter-spacing: -0.02em;
    line-height: 1.0;
    margin-bottom: 16px;
  }
  .state-name {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: #6A6B6C;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 32px;
  }
  .tagline {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #6A6B6C;
  }
  .accent-line {
    width: 72px;
    height: 3px;
    background: #D8A0C4;
    border-radius: 2px;
    margin-bottom: 32px;
  }
</style>
</head>
<body>
<div class="hero-card">
  <div class="accent-line"></div>
  <div class="city-name">Greensboro</div>
  <div class="state-name">NC</div>
  <div class="tagline">Birth support resources for Greensboro families</div>
</div>
</body>
</html>
