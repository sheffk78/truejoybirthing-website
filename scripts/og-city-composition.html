<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .og-card {
    display: flex;
    flex-direction: row;
    width: 1200px;
    height: 630px;
  }
  .left-column {
    width: 660px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px 60px 72px;
  }
  .right-column {
    width: 540px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #F1F1FB 0%, #FAF8F5 40%, #E6E4F4 100%);
  }
  .right-column::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 540px;
    height: 630px;
    background:
      radial-gradient(circle at 20% 80%, rgba(184,122,160,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(110,108,153,0.06) 0%, transparent 40%);
  }
  .right-column::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    background: linear-gradient(to top, rgba(218,160,196,0.05) 0%, transparent 100%);
  }
  /* Decorative location pin and city initial */
  .city-initial {
    position: absolute;
    top: 50%;
    right: 80px;
    transform: translateY(-50%);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 280px;
    color: rgba(110,108,153,0.07);
    line-height: 1;
    letter-spacing: -0.02em;
    user-select: none;
  }
  .pin-silhouette {
    position: absolute;
    top: 45%;
    right: 60px;
    transform: translateY(-50%);
    width: 60px;
    height: 80px;
    opacity: 0.06;
  }
  .pin-silhouette svg {
    width: 100%;
    height: 100%;
  }
  .accent-line {
    width: 36px;
    height: 2px;
    background: #D8A0C4;
    border-radius: 1px;
    margin-bottom: 24px;
  }
  .eyebrow {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #B87AA0;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 52px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .subhead {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: #6A6B6C;
    letter-spacing: 0.01em;
    line-height: 1.4;
    margin-top: 18px;
    max-width: 560px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #E6E4F4;
    margin-top: 24px;
    margin-bottom: 16px;
  }
  .brand-line {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #6E6C99;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="left-column">
    <div class="eyebrow" id="eyebrow">Birth support</div>
    <div class="accent-line"></div>
    <div class="headline" id="headline">Doulas & Birth Plans in Austin, TX</div>
    <div class="subhead" id="subhead">Free birth plan template · Hospital info · Real costs · Medicaid coverage</div>
    <div class="divider"></div>
    <div class="brand-line">True Joy Birthing</div>
  </div>
  <div class="right-column">
    <div class="city-initial" id="city-initial">A</div>
    <div class="pin-silhouette">
      <svg viewBox="0 0 24 32" fill="#6E6C99" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 20 12 20s12-11 12-20c0-6.63-5.37-12-12-12zm0 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
      </svg>
    </div>
  </div>
</div>
<script>
  // Read URL params for dynamic generation
  const params = new URLSearchParams(window.location.search);
  const city = params.get('city') || 'Austin';
  const state = params.get('state') || 'TX';
  const initial = city.charAt(0).toUpperCase();

  document.getElementById('headline').textContent = `Doulas & Birth Plans in ${city}, ${state}`;
  document.getElementById('city-initial').textContent = initial;
  document.getElementById('eyebrow').textContent = `${city} birth support`;
</script>
</body>
</html>
