<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .og-card {
    display: flex;
    flex-direction: row;
    width: 1200px;
    height: 630px;
  }
  .left-column {
    width: 660px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px;
  }
  .right-column {
    width: 540px;
    background: url('../public/images/charlotte-nc-birth-doula-skyline-v2.webp') center/cover no-repeat;
    position: relative;
  }
  .right-column::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 80px;
    height: 100%;
    background: linear-gradient(to right, #FAF8F5 0%, rgba(250,248,245,0) 100%);
    z-index: 1;
  }
  .accent-line {
    width: 36px;
    height: 2px;
    background: #D8A0C4;
    border-radius: 1px;
    margin-bottom: 24px;
  }
  .eyebrow {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #B87AA0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 52px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .subhead {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #6A6B6C;
    letter-spacing: 0.01em;
    line-height: 1.4;
    margin-top: 18px;
    max-width: 520px;
  }
  .brand {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #B87AA0;
    margin-top: auto;
    padding-top: 24px;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="left-column">
    <div class="accent-line"></div>
    <div class="eyebrow">CHARLOTTE BIRTH SUPPORT</div>
    <div class="headline">Doulas & Birth Plans in Charlotte, NC</div>
    <div class="subhead">Free birth plan template · Hospital info · Real costs · Medicaid coverage</div>
    <div class="brand">True Joy Birthing</div>
  </div>
  <div class="right-column"></div>
</div>
</body>
</html>
