<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .og-card {
    display: flex;
    flex-direction: row;
    width: 1200px;
    height: 630px;
  }
  /* LEFT: Text content on cream gradient */
  .left-column {
    width: 660px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 64px;
    background: linear-gradient(180deg, #FAF8F5 0%, #EDE5F5 100%);
    position: relative;
  }
  /* Rose accent bar at top */
  .left-column::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #D8A0C4;
  }
  /* Rose accent bar at bottom */
  .left-column::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #D8A0C4;
  }
  /* RIGHT: Hero image */
  .right-column {
    width: 540px;
    position: relative;
    overflow: hidden;
  }
  .right-column img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  /* Rose accent bars on image side */
  .right-column::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #D8A0C4;
    z-index: 2;
  }
  .right-column::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: #D8A0C4;
    z-index: 2;
  }
  .accent-line {
    width: 40px;
    height: 3px;
    background: #D8A0C4;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .eyebrow {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #B87AA0;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700;
    font-size: 52px;
    color: #2A2A2A;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .summary {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: #555555;
    letter-spacing: 0.005em;
    line-height: 1.5;
    margin-bottom: 18px;
    max-width: 520px;
  }
  .subhead {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #6A6B6C;
    letter-spacing: 0.02em;
  }
  .subhead span {
    margin: 0 8px;
    color: #D8A0C4;
  }
  /* Logo — mono SVG for contrast on cream backgrounds, minimum 56px height */
  .logo-area {
    margin-top: auto;
    padding-top: 20px;
    display: flex;
    align-items: center;
  }
  .logo-area img {
    height: 56px;
    width: auto;
  }
</style>
</head>
