<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; background: #FAF8F5; }

.og-card {
  width: 1200px;
  height: 630px;
  background: linear-gradient(180deg, #FAF8F5 0%, #E8E6F0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 60px 80px 70px 80px;
  font-family: 'Source Sans 3', system-ui, sans-serif;
}
.og-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
}
.og-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
}

.label {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: #6E6C99;
  text-transform: uppercase;
  letter-spacing: 5px;
  margin-bottom: 24px;
}

.city-name {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 80px;
  font-weight: 700;
  color: #2D2B55;
  line-height: 1.05;
  letter-spacing: -2px;
  text-align: center;
  margin-bottom: 4px;
}

.state-abbr {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 80px;
  font-weight: 700;
  color: #6E6C99;
  letter-spacing: -1px;
  text-align: center;
  margin-bottom: 32px;
}

.subtext {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 26px;
  font-weight: 400;
  color: #6E6C99;
  text-align: center;
  letter-spacing: 0.5px;
}

.logo-wrap {
  position: absolute;
  bottom: 22px;
  left: 36px;
}
.logo-wrap img {
  height: 44px;
  width: auto;
}
</style>
</head>
<body>
<div class="og-card">
  <div class="label">Birth Support</div>
  <div style="text-align: center;">
    <span class="city-name">Denver, </span><span class="state-abbr">CO</span>
  </div>
  <div class="subtext">Doulas · Hospital Info · Joyful Birth Plan</div>
  <div class="logo-wrap">
    <img src="/images/logo.svg" alt="True Joy Birthing">
  </div>
</div>
</body>
</html>
