<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .og-card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(180deg, #FAF8F5 0%, #F0EFF4 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  .og-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #D8A0C4;
  }
  .og-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: #D8A0C4;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .logo-wrap img {
    width: 580px;
    height: auto;
    display: block;
  }
  .tagline {
    font-size: 26px;
    font-weight: 600;
    color: #6E6C99;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="logo-wrap">
    <img src="../logo.svg" alt="True Joy Birthing">
  </div>
  <div class="tagline">Joyful Birth Plan</div>
</div>
</body>
</html>
