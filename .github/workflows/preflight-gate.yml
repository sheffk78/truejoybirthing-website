name: TJB Preflight Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run preflight self-test
        run: bash scripts/preflight-self-test.sh
        env:
          CI: true

      - name: Run preflight gate (full audit)
        run: npx tsx scripts/preflight.ts
        env:
          CI: true