<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; background: #2D2B55; }

.og-card {
  width: 1200px;
  height: 630px;
  display: flex;
  flex-direction: row;
  position: relative;
  overflow: hidden;
}

/* LEFT HALF — hero image */
.image-half {
  width: 50%;
  height: 630px;
  position: relative;
  overflow: hidden;
}
.image-half img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* RIGHT HALF — text content on brand cream */
.text-half {
  width: 50%;
  height: 630px;
  background: linear-gradient(180deg, #FAF8F5 0%, #E8E6F0 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 60px 60px 50px;
  position: relative;
  overflow: hidden;
}

/* Accent bars */
.text-half::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
  z-index: 10;
}
.text-half::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 6px;
  background: #D8A0C4;
  z-index: 10;
}

/* Subtle watermark behind text */
.watermark {
  position: absolute;
  bottom: -20px;
  right: -10px;
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 200px;
  font-weight: 700;
  letter-spacing: -8px;
  color: rgba(110, 108, 153, 0.05);
  line-height: 1;
  user-select: none;
  white-space: nowrap;
  z-index: 1;
}

/* Rose accent line above label */
.rose-line {
  width: 40px;
  height: 3px;
  background: #D8A0C4;
  margin-bottom: 16px;
  position: relative;
  z-index: 5;
}

.label {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: #6E6C99;
  text-transform: uppercase;
  letter-spacing: 5px;
  margin-bottom: 16px;
  position: relative;
  z-index: 5;
}

.city-line {
  position: relative;
  z-index: 5;
  margin-bottom: 12px;
  line-height: 1;
}

.city-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 64px;
  font-weight: 700;
  color: #2D2B55;
  letter-spacing: -1px;
}

.state-abbr {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 64px;
  font-weight: 700;
  color: #6E6C99;
  letter-spacing: -1px;
}

.subtext {
  font-family: 'Source Sans 3', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 400;
  color: #6E6C99;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 5;
}

/* Logo bottom-right */
.logo-wrap {
  position: absolute;
  bottom: 24px;
  right: 40px;
  z-index: 10;
}
.logo-wrap img {
  height: 40px;
  width: auto;
}
</style>
</head>
<body>
<div class="og-card">
  <!-- LEFT: Hero image — replace src with city-specific hero for each city -->
  <div class="image-half">
    <img src="denver-hero-front-range.webp" alt="Birth support in Denver, Colorado">
  </div>

  <!-- RIGHT: Brand text content -->
  <div class="text-half">
    <div class="watermark">DENVER</div>
    <div class="rose-line"></div>
    <div class="label">Birth Support</div>
    <div class="city-line">
      <span class="city-name">Denver, </span><span class="state-abbr">CO</span>
    </div>
    <div class="subtext">Doulas · Hospital Info · Joyful Birth Plan</div>
    <div class="logo-wrap">
      <img src="logo.svg" alt="True Joy Birthing">
    </div>
  </div>
</div>
</body>
</html>
